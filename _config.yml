title: LuxLu CTF Lab
subtitle: 黑粉色 CTF Misc 博客
description: 记录 CTF Misc 题解、取证、隐写与脚本工具
keywords:
  - CTF
  - Misc
  - Forensics
  - Stego
author: LuxLu
language: zh-CN
timezone: Asia/Shanghai

url: https://luxlu.top
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

index_generator:
  path: ''
  per_page: 8
  order_by: -date

default_category: misc
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

per_page: 8
pagination_dir: page

include:
exclude:
ignore:

theme: butterfly

deploy:
  type: git
  repo: https://github.com/<your-github-username>/luxlu-blog.git
  branch: gh-pages
